<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打卡弹窗测试</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 20px; }
    
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .overlay.show { display: flex; }
    
    .popup {
      background: white;
      border-radius: 24px;
      padding: 30px;
      width: 90%;
      max-width: 320px;
      text-align: center;
    }
    
    #confirm-btn {
      display: block;
      background: #00b09b;
      color: white;
      padding: 18px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      margin-top: 16px;
      cursor: pointer;
    }
    
    #cancel-btn {
      display: block;
      background: #eee;
      color: #666;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
    
    .log {
      margin-top: 20px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 14px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .log-item { padding: 4px 0; border-bottom: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>打卡弹窗测试</h1>
  
  <p>点击按钮打开弹窗，然后点击"确认打卡"按钮测试是否正常关闭。</p>
  
  <button onclick="openModal()" style="padding: 16px 32px; font-size: 18px; cursor: pointer;">
    打开打卡弹窗
  </button>
  
  <div class="overlay" id="test-overlay">
    <div class="popup">
      <h3>打卡确认</h3>
      <p>确定要在此地点打卡吗？</p>
      
      <button id="confirm-btn" onclick="onConfirm()">
        ✅ 确认打卡
      </button>
      
      <button id="cancel-btn" onclick="onCancel()">
        取消
      </button>
    </div>
  </div>
  
  <div class="log" id="log">
    <div class="log-item">日志将在此显示...</div>
  </div>
  
  <script>
    function log(msg) {
      var div = document.createElement('div');
      div.className = 'log-item';
      div.textContent = new Date().toLocaleTimeString() + ': ' + msg;
      document.getElementById('log').appendChild(div);
      console.log(msg);
    }
    
    function openModal() {
      log('打开弹窗');
      var overlay = document.getElementById('test-overlay');
      overlay.style.display = 'flex';
      log('overlay.style.display = ' + overlay.style.display);
    }
    
    function onConfirm() {
      log('点击了确认打卡!');
      var overlay = document.getElementById('test-overlay');
      log('当前 overlay.style.display = ' + overlay.style.display);
      
      // 尝试关闭
      overlay.style.display = 'none';
      log('已设置 overlay.style.display = none');
      log('现在 overlay.style.display = ' + overlay.style.display);
      
      // 检查实际状态
      setTimeout(function() {
        log('2秒后检查: overlay.style.display = ' + overlay.style.display);
        log('overlay是否可见: ' + (overlay.offsetHeight > 0 && overlay.offsetWidth > 0));
      }, 100);
    }
    
    function onCancel() {
      log('点击了取消');
      document.getElementById('test-overlay').style.display = 'none';
      log('弹窗已关闭');
    }
    
    // 页面加载时测试
    window.onload = function() {
      log('页面加载完成');
      log('初始 overlay.style.display = ' + document.getElementById('test-overlay').style.display);
    };
  </script>
</body>
</html>
